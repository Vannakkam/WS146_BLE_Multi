<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Board Time Synchronization</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            max-width: 450px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin-top: 20px; font-weight: 500; color: #666; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h2>ESP32-S3 System Clock Sync</h2>
    <p>Transmit accurate device Epoch Time to the hardware module using Web Bluetooth.</p>
    <button id="connectBtn" onclick="syncTime()">Connect & Synchronize</button>
    <div id="statusLog" class="status">Disconnected</div>
</div>

<script>
const NUS_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

async function syncTime() {
    const log = document.getElementById("statusLog");
    const btn = document.getElementById("connectBtn");
    
    try {
        log.textContent = "Requesting Bluetooth device pairing window...";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'ESP32-S3 Round Display' }],
            optionalServices: [NUS_SERVICE_UUID]
        });

        btn.disabled = true;
        log.textContent = "Connecting to device profile...";
        const server = await device.gatt.connect();

        log.textContent = "Opening communication interface...";
        const service = await server.getPrimaryService(NUS_SERVICE_UUID);
        const rxCharacteristic = await service.getCharacteristic(NUS_RX_CHAR_UUID);

        // Calculate UTC Epoch in whole seconds
        const epochSeconds = Math.floor(Date.now() / 1000);
        const payloadStr = `EPOCH:${epochSeconds}`;
        
        log.textContent = `Transmitting payload: ${payloadStr}...`;
        const encoder = new TextEncoder();
        await rxCharacteristic.writeValue(encoder.encode(payloadStr));

        log.className = "status success";
        log.innerHTML = `✔ Synchronization Completed!<br>Sent Epoch: <b>${epochSeconds}</b>`;
        
        // Gracefully exit and drop the link to free the BLE slot
        setTimeout(() => {
            server.disconnect();
            btn.disabled = false;
        }, 1500);

    } catch (error) {
        console.error(error);
        log.className = "status";
        log.textContent = `Error: ${error.message}`;
        btn.disabled = false;
    }
}
</script>
</body>
</html>
